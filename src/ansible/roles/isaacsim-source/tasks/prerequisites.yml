- name: Install system dependencies
  apt:
    name: "{{ item }}"
    state: latest
  with_items:
    - build-essential
    - gcc-11
    - g++-11
    - cmake
    - git
    - git-lfs
    - python3
    - python3-pip
    - python3-venv
    - libvulkan-dev
    - vulkan-tools
    - libgl1-mesa-dev
    - libglu1-mesa-dev
    - libx11-dev
    - libxcursor-dev
    - libxrandr-dev
    - libxinerama-dev
    - libxi-dev
    - libxkbcommon-dev
    - curl

- name: Set GCC 11 as default
  shell: |
    update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 200
    update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 200

- name: Initialize git-lfs
  shell: git lfs install
  become_user: "{{ ansible_user }}"
