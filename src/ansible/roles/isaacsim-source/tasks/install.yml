- name: Create Isaac Sim source directory
  file:
    path: "{{ isaacsim_source_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: Clone Isaac Sim repository
  git:
    repo: "{{ isaacsim_git_repo }}"
    dest: "{{ isaacsim_source_dir }}"
    version: "{{ isaacsim_git_checkpoint }}"
    force: true
  become_user: "{{ ansible_user }}"

- name: Pull LFS files
  shell: git lfs pull
  args:
    chdir: "{{ isaacsim_source_dir }}"
  become_user: "{{ ansible_user }}"

- name: Accept EULA
  file:
    path: "{{ isaacsim_source_dir }}/.eula_accepted"
    state: touch
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Build Isaac Sim
  shell: ./build.sh --release
  args:
    chdir: "{{ isaacsim_source_dir }}"
  become_user: "{{ ansible_user }}"
  poll: 1

- name: Set ownership of Isaac Sim directory
  file:
    path: "{{ isaacsim_source_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    recurse: true
