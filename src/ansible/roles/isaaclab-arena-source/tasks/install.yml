- name: Check if Isaac Lab Arena is already installed
  stat:
    path: "{{ isaaclab_arena_dir }}/.git"
  register: isaaclab_arena_existing

- name: Get current Isaac Lab Arena git ref
  shell: |
    cd "{{ isaaclab_arena_dir }}"
    # check if the desired ref matches the current HEAD
    # resolve the desired ref to a commit hash via ls-remote
    DESIRED_HASH=$(git ls-remote "{{ isaaclab_arena_git_repo }}" "{{ isaaclab_arena_git_checkpoint }}" | head -1 | awk '{print $1}')
    CURRENT_HASH=$(git rev-parse HEAD)
    if [ "$DESIRED_HASH" = "$CURRENT_HASH" ]; then
      echo "match"
    else
      echo "mismatch"
    fi
  become_user: "{{ ansible_user }}"
  register: isaaclab_arena_ref_check
  changed_when: false
  when: isaaclab_arena_existing.stat.exists

- name: Detect whether Isaac Lab Arena installation is needed
  set_fact:
    isaaclab_arena_needs_install: >-
      {{ not isaaclab_arena_existing.stat.exists or
         (isaaclab_arena_ref_check.stdout | default('mismatch') | trim) != 'match' }}

- name: Create Isaac Lab Arena directory
  file:
    path: "{{ isaaclab_arena_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755
  when: isaaclab_arena_needs_install

- name: Configure git to use HTTPS instead of SSH for github.com
  shell: |
    git config --global --unset-all 'url.https://github.com/.insteadOf' 2>/dev/null || true
    git config --global --unset-all 'url."https://github.com/".insteadOf' 2>/dev/null || true
    git config --global url.https://github.com/.insteadOf git@github.com:
  become_user: "{{ ansible_user }}"
  changed_when: false
  when: isaaclab_arena_needs_install

- name: Clone Isaac Lab Arena repository
  shell: |
    if [ -d "{{ isaaclab_arena_dir }}/.git" ]; then
      cd "{{ isaaclab_arena_dir }}"
      git fetch --depth 1 origin "{{ isaaclab_arena_git_checkpoint }}"
      git checkout FETCH_HEAD
      git submodule update --init --recursive --depth 1
    else
      git clone --depth 1 --recurse-submodules --shallow-submodules \
        -b "{{ isaaclab_arena_git_checkpoint }}" \
        "{{ isaaclab_arena_git_repo }}" "{{ isaaclab_arena_dir }}"
    fi
  become_user: "{{ ansible_user }}"
  register: clone_result
  changed_when: "'Already up to date' not in clone_result.stdout"
  when: isaaclab_arena_needs_install
